name: Publish Release Asset

on:
  release:
    types: [published]

jobs:
  upload-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package -o lumina-code.vsix

      - name: Upload VSIX to Release
        run: gh release upload ${{ github.event.release.tag_name }} lumina-code.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
